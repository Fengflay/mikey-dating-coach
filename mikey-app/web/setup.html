<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mikey Dating Coach - Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0D1117;
      color: #E6E1D8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .setup-card {
      background: #1C2333;
      border: 1px solid #2D3545;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .setup-logo {
      font-size: 48px;
      text-align: center;
      margin-bottom: 8px;
    }
    .setup-title {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: #D4883A;
    }
    .setup-subtitle {
      font-size: 15px;
      color: #9B9485;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #9B9485;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #2D3545;
      border-radius: 10px;
      background: #0D1117;
      color: #E6E1D8;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      outline: none;
      border-color: #D4883A;
    }
    .form-input::placeholder { color: #6B6560; }
    .form-hint {
      font-size: 12px;
      color: #6B6560;
      margin-top: 6px;
      line-height: 1.5;
    }
    .form-hint a {
      color: #D4883A;
      text-decoration: none;
    }
    .form-hint a:hover { text-decoration: underline; }
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #D4883A;
      color: white;
      font-size: 13px;
      font-weight: 700;
      margin-right: 8px;
    }
    .btn-setup {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 9999px;
      background: #D4883A;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 12px;
    }
    .btn-setup:hover { background: #B86E25; }
    .btn-setup:disabled {
      background: #2D3545;
      color: #6B6560;
      cursor: not-allowed;
    }
    .status-msg {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
    .status-msg.error { color: #D4645C; }
    .status-msg.success { color: #4CAF7D; }
    .divider {
      height: 1px;
      background: #2D3545;
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="setup-logo">M</div>
    <h1 class="setup-title">Mikey Dating Coach</h1>
    <p class="setup-subtitle">
      Two keys. That's all you need.<br>
      Enter them below and you're ready to go.
    </p>

    <div class="form-group">
      <label class="form-label"><span class="step-number">1</span> Telegram Bot Token</label>
      <input type="text" class="form-input" id="telegram-token"
             placeholder="123456789:ABCdefGHIjklMNOpqrsTUVwxyz">
      <div class="form-hint">
        Get one from <a href="https://t.me/BotFather" target="_blank">@BotFather</a> on Telegram.
        Send /newbot and follow the steps.
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><span class="step-number">2</span> Claude API Key</label>
      <input type="password" class="form-input" id="claude-key"
             placeholder="sk-ant-api03-...">
      <div class="form-hint">
        Get one from <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>.
        You need a funded account.
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-setup" id="save-btn" onclick="saveSetup()">
      Start Mikey
    </button>

    <div class="status-msg" id="status-msg"></div>
  </div>

  <script>
    const tokenInput = document.getElementById('telegram-token');
    const keyInput = document.getElementById('claude-key');
    const saveBtn = document.getElementById('save-btn');
    const statusMsg = document.getElementById('status-msg');

    // Enable button when both fields have values
    function checkInputs() {
      saveBtn.disabled = !(tokenInput.value.trim() && keyInput.value.trim());
    }
    tokenInput.addEventListener('input', checkInputs);
    keyInput.addEventListener('input', checkInputs);
    checkInputs();

    async function saveSetup() {
      const token = tokenInput.value.trim();
      const key = keyInput.value.trim();

      if (!token || !key) return;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Setting up...';
      statusMsg.textContent = '';
      statusMsg.className = 'status-msg';

      try {
        const resp = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            telegramBotToken: token,
            claudeApiKey: key
          })
        });

        const data = await resp.json();

        if (data.ok) {
          statusMsg.textContent = 'Setup complete! Redirecting...';
          statusMsg.className = 'status-msg success';
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } else {
          statusMsg.textContent = data.message || 'Setup failed. Check your keys.';
          statusMsg.className = 'status-msg error';
          saveBtn.disabled = false;
          saveBtn.textContent = 'Start Mikey';
        }
      } catch (err) {
        statusMsg.textContent = 'Connection error: ' + err.message;
        statusMsg.className = 'status-msg error';
        saveBtn.disabled = false;
        saveBtn.textContent = 'Start Mikey';
      }
    }
  </script>
</body>
</html>
